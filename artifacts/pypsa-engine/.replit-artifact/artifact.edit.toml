kind = "api"
previewPath = "/pypsa"
title = "PyPSA Engine"
version = "1.0.0"
id = "artifacts/pypsa-engine"

[[services]]
localPort = 8083
name = "PyPSA Engine"
paths = ["/pypsa"]

[services.development]
run = "cd artifacts/pypsa-engine && .venv/bin/python main.py"

[services.production.run]
args = ["bash", "-c", "cd artifacts/pypsa-engine && .venv/bin/python main.py"]

[services.production.run.env]
PORT = "8083"
NODE_ENV = "production"

[services.production.health.startup]
path = "/pypsa/healthz"
