kind = "web"
previewPath = "/aeso/"
title = "Modelling AESO"
version = "1.0.0"
id = "artifacts/aeso-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/aeso/" ]
localPort = 22537

[services.development]
run = "pnpm --filter @workspace/aeso-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aeso-platform", "run", "build" ]
publicDir = "artifacts/aeso-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22537"
BASE_PATH = "/aeso/"
