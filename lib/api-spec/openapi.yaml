openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Grid Origination Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Project candidate operations
  - name: screenings
    description: Screening session operations
  - name: ercot-node-stats
    description: ERCOT hub/zone node stats
  - name: ercot-nodal-stats
    description: ERCOT resource nodal stats
  - name: caiso-node-stats
    description: CAISO node stats
  - name: pjm-node-stats
    description: PJM hub/zone node stats
  - name: queue-projects
    description: Interconnection queue projects
  - name: dashboard
    description: Dashboard summary endpoints
  - name: aeso
    description: AESO Alberta power market endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List all candidates
      parameters:
        - name: market
          in: query
          schema:
            type: string
            enum: [ERCOT, CAISO, PJM]
        - name: assetType
          in: query
          schema:
            type: string
            enum: [solar, wind, storage, natural_gas, hydro, nuclear, biomass, geothermal]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, under_review, contracted]
        - name: minScore
          in: query
          schema:
            type: number
        - name: maxScore
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 5000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create a new candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateInput"
      responses:
        "201":
          description: Created candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a single candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateInput"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
    delete:
      operationId: deleteCandidate
      tags: [candidates]
      summary: Delete a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /screenings:
    get:
      operationId: listScreenings
      tags: [screenings]
      summary: List saved screening sessions
      responses:
        "200":
          description: List of screenings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Screening"
    post:
      operationId: createScreening
      tags: [screenings]
      summary: Save a screening session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreeningInput"
      responses:
        "201":
          description: Created screening
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screening"

  /screenings/{id}:
    get:
      operationId: getScreening
      tags: [screenings]
      summary: Get a screening session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Screening
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screening"
    delete:
      operationId: deleteScreening
      tags: [screenings]
      summary: Delete a screening session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ercot-node-stats:
    get:
      operationId: listErcotNodeStats
      tags: [ercot-node-stats]
      summary: List ERCOT hub/zone/resource-node monthly stats
      parameters:
        - name: node
          in: query
          schema:
            type: string
        - name: nodeType
          in: query
          schema:
            type: string
            enum: [hub, load_zone, resource_node]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [neg_price_percent, volatility, avg_rt_price, price_range]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: ERCOT node stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErcotNodeStats"

  /ercot-settlement-points:
    get:
      operationId: listErcotSettlementPoints
      tags: [ercot-nodal-stats]
      summary: List distinct ERCOT settlement point names (resource nodes only)
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of settlement point names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /ercot-nodal-stats:
    get:
      operationId: listErcotNodalStats
      tags: [ercot-nodal-stats]
      summary: List ERCOT resource nodal stats
      parameters:
        - name: settlementPoint
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: ERCOT nodal stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErcotNodalStats"

  /caiso-settlement-points:
    get:
      operationId: listCaisoSettlementPoints
      tags: [caiso-node-stats]
      summary: List distinct CAISO settlement point names (resource nodes only, excludes zones)
      responses:
        "200":
          description: List of CAISO node names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /caiso-node-stats:
    get:
      operationId: listCaisoNodeStats
      tags: [caiso-node-stats]
      summary: List CAISO node stats
      parameters:
        - name: node
          in: query
          schema:
            type: string
            enum: [NP15, SP15, ZP26]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: CAISO node stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaisoNodeStats"

  /pjm-settlement-points:
    get:
      operationId: listPjmSettlementPoints
      tags: [pjm-node-stats]
      summary: List distinct PJM settlement point names (resource nodes only, excludes zone/hub nodes)
      responses:
        "200":
          description: List of PJM node names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /pjm-node-stats:
    get:
      operationId: listPjmNodeStats
      tags: [pjm-node-stats]
      summary: List PJM hub/zone node stats
      parameters:
        - name: node
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: PJM node stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PjmNodeStats"

  /queue-projects:
    get:
      operationId: listQueueProjects
      tags: [queue-projects]
      summary: List interconnection queue projects
      parameters:
        - name: market
          in: query
          schema:
            type: string
            enum: [ERCOT, CAISO, PJM]
        - name: status
          in: query
          schema:
            type: string
        - name: fuelType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 2000
      responses:
        "200":
          description: Queue projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueProject"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/market-breakdown:
    get:
      operationId: getMarketBreakdown
      tags: [dashboard]
      summary: Get candidate breakdown by market and asset type
      responses:
        "200":
          description: Market breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketBreakdown"

  /dashboard/top-candidates:
    get:
      operationId: getTopCandidates
      tags: [dashboard]
      summary: Get top-scored candidates
      parameters:
        - name: objective
          in: query
          schema:
            type: string
            enum: [lowest_lcoe, risk_adjusted_value, load_hedge, decarbonization]
            default: risk_adjusted_value
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /dashboard/queue-summary:
    get:
      operationId: getQueueSummary
      tags: [dashboard]
      summary: Get queue project fuel-type and status breakdown
      responses:
        "200":
          description: Queue summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueSummary"

  /aeso/dashboard:
    get:
      operationId: getAesoDashboard
      tags: [aeso]
      summary: AESO dashboard summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AesoDashboard"

  /aeso/pool-price:
    get:
      operationId: getAesoPoolPrice
      tags: [aeso]
      summary: Pool price time series
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Pool price hourly rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoPoolPriceRow"

  /aeso/pool-price/stats:
    get:
      operationId: getAesoPoolPriceStats
      tags: [aeso]
      summary: Monthly pool price statistics
      responses:
        "200":
          description: Monthly stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoMonthlyPriceStat"

  /aeso/pool-price/spikes:
    get:
      operationId: getAesoPoolPriceSpikes
      tags: [aeso]
      summary: Pool price spike events (price >= threshold)
      parameters:
        - name: threshold
          in: query
          schema: { type: number }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Spike events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoPoolPriceRow"

  /aeso/generation:
    get:
      operationId: getAesoGeneration
      tags: [aeso]
      summary: Hourly generation mix
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Hourly generation mix rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoGenerationRow"

  /aeso/generation/monthly:
    get:
      operationId: getAesoGenerationMonthly
      tags: [aeso]
      summary: Monthly generation mix aggregates
      responses:
        "200":
          description: Monthly aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoGenerationMonthlyStat"

  /aeso/supply-demand:
    get:
      operationId: getAesoSupplyDemand
      tags: [aeso]
      summary: Hourly supply and demand
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Hourly supply/demand rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoSupplyDemandRow"

  /aeso/supply-demand/stats:
    get:
      operationId: getAesoSupplyDemandStats
      tags: [aeso]
      summary: Monthly supply/demand averages
      responses:
        "200":
          description: Monthly supply/demand stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoSupplyDemandMonthlyStat"

  /aeso/outages:
    get:
      operationId: getAesoOutages
      tags: [aeso]
      summary: Outage events
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: fuelType
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Outage list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoOutageRow"

  /aeso/outages/upcoming:
    get:
      operationId: getAesoOutagesUpcoming
      tags: [aeso]
      summary: Upcoming planned outages
      responses:
        "200":
          description: Upcoming outages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoOutageRow"

  /aeso/7day-capability:
    get:
      operationId: getAeso7dayCapability
      tags: [aeso]
      summary: 7-day generation capability forecast
      responses:
        "200":
          description: 7-day capability rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Aeso7dayCapabilityRow"

  /aeso/queue:
    get:
      operationId: getAesoQueue
      tags: [aeso]
      summary: AESO interconnection queue projects
      parameters:
        - name: fuelType
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Queue project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoQueueProject"

  /aeso/queue/stats:
    get:
      operationId: getAesoQueueStats
      tags: [aeso]
      summary: AESO queue summary statistics
      responses:
        "200":
          description: Queue stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AesoQueueSummary"

  /aeso/constraints:
    get:
      operationId: getAesoConstraints
      tags: [aeso]
      summary: Constraint events
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: corridor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Constraint events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoConstraintRow"

  /aeso/actual-forecast:
    get:
      operationId: getAesoActualForecast
      tags: [aeso]
      summary: Actual vs forecast comparison
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Actual vs forecast rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoActualForecastRow"

  /aeso/transmission-corridors:
    get:
      operationId: getAesoTransmissionCorridors
      tags: [aeso]
      summary: Transmission corridor ratings and congestion
      responses:
        "200":
          description: Corridor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoTransmissionCorridor"


  /aeso/smp:
    get:
      operationId: getAesoSmp
      tags: [aeso]
      summary: System marginal price monthly history (congestion rent)
      parameters:
        - { name: from, in: query, schema: { type: string } }
        - { name: to,   in: query, schema: { type: string } }
      responses:
        "200":
          description: Monthly SMP stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoSmpStat"

  /aeso/interchange:
    get:
      operationId: getAesoInterchange
      tags: [aeso]
      summary: BC/SK intertie actual and scheduled flows by month
      parameters:
        - { name: from, in: query, schema: { type: string } }
        - { name: to,   in: query, schema: { type: string } }
      responses:
        "200":
          description: Monthly interchange summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AesoInterchangeStat"

  /ercot/zone-load-hourly:
    get:
      operationId: getErcotZoneLoadHourly
      tags: [ercot-load]
      summary: Raw hourly load time-series for one ERCOT EIA sub-BA zone
      parameters:
        - { name: zone,  in: query, required: true,  schema: { type: string } }
        - { name: year,  in: query, required: false, schema: { type: integer } }
        - { name: month, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Hourly load rows for the requested zone/year/month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErcotZoneLoadHour"

  /ercot/bus-shift-factors:
    get:
      operationId: getErcotBusShiftFactors
      tags: [ercot-load]
      summary: PTDF-derived shift factors mapping each 345 kV bus to its EIA sub-BA zone
      parameters:
        - { name: eiaZone, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: List of buses with PTDF-derived shift factors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErcotBusShiftFactor"

  /ercot/bus-load:
    get:
      operationId: getErcotBusLoad
      tags: [ercot-load]
      summary: Hourly bus-level load approximation (shift_factor × zone_load)
      parameters:
        - { name: bus,   in: query, required: true,  schema: { type: string } }
        - { name: year,  in: query, required: false, schema: { type: integer } }
        - { name: month, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Hourly load estimate for the requested bus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErcotBusLoadHour"

  /temperature:
    get:
      operationId: getTemperature
      tags: [temperature]
      summary: Hourly temperatures by zone for a given ISO and calendar month
      parameters:
        - { name: iso,   in: query, required: false, schema: { type: string } }
        - { name: year,  in: query, required: false, schema: { type: integer } }
        - { name: month, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Hourly temperature rows (zone × day × hour)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyTemperature"

  /temperature/stats:
    get:
      operationId: getTemperatureStats
      tags: [temperature]
      summary: Monthly avg/min/max temperature per zone
      parameters:
        - { name: iso, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Monthly temperature statistics per zone
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureStat"

  /temperature/forecast:
    get:
      operationId: getTemperatureForecast
      tags: [temperature]
      summary: Daily temperature forecast (mean/min/max) for a given ISO and calendar month
      parameters:
        - { name: iso,   in: query, required: false, schema: { type: string } }
        - { name: year,  in: query, required: false, schema: { type: integer } }
        - { name: month, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Daily forecast rows (zone × day)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureForecastDay"

  /temperature/forecast/overview:
    get:
      operationId: getTemperatureForecastOverview
      tags: [temperature]
      summary: Monthly aggregated temperature forecast for 3-year horizon
      parameters:
        - { name: iso, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Monthly forecast summary per zone
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureForecastMonth"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    Candidate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        market:
          type: string
          enum: [ERCOT, CAISO, PJM]
        assetType:
          type: string
          enum: [solar, wind, storage, solar_storage, wind_storage, hydro, biomass, geothermal, natural_gas, nuclear]
        status:
          type: string
          enum: [active, inactive, under_review, contracted]
        capacityMw:
          type: number
        latitude:
          type: number
        longitude:
          type: number
        county:
          type: string
        state:
          type: string
